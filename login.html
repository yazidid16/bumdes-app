<style>
    body { margin: 0; display: flex; height: 100vh; font-family: 'Plus Jakarta Sans', sans-serif; }
    /* Bagian Kiri (Form) */
    .auth-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px; }
    .auth-box { width: 100%; max-width: 400px; }
    /* Bagian Kanan (Visual) */
    .auth-visual { flex: 1; background: var(--primary); display: flex; align-items: center; justify-content: center; color: white; padding: 40px; }
    /* Hide visual on mobile */
    @media (max-width: 992px) { .auth-visual { display: none; } }
</style>

<body>
    <div class="auth-container">
        <div class="auth-box">
            <h2 class="fw-bold mb-2">Selamat Datang!</h2>
            <p class="text-muted mb-4">Masuk ke portal BUMDes untuk mengelola data desa.</p>
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" id="username" class="form-control p-3 rounded-3" placeholder="Masukkan username" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control p-3 rounded-3" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 p-3 fw-bold rounded-3">Masuk Dashboard</button>
            </form>
        </div>
    </div>
    <div class="auth-visual">
        <div class="text-center">
            <img src="assets/img/bumdes-illustration.svg" alt="BUMDes Illustration" style="width: 80%; max-width: 400px;">
            <h3 class="mt-4 fw-bold">Kelola Desa, Majukan Ekonomi</h3>
            <p class="opacity-75">Sistem transparansi keuangan desa terintegrasi.</p>
        </div>
    </div>
</body>
