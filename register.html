<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun - BUMDes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body { background: var(--bg-body); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .auth-card { width: 100%; max-width: 400px; padding: 30px; background: white; border-radius: 20px; box-shadow: var(--shadow-soft); }
    </style>
</head>
<body>
    <div class="auth-card">
        <h3 class="fw-bold mb-4 text-center">Buat Akun Baru</h3>
        <form id="registerForm">
            <div class="mb-3">
                <label class="form-label text-muted">Username</label>
                <input type="text" id="regUsername" class="form-control p-3" required>
            </div>
            <div class="mb-3">
                <label class="form-label text-muted">Password</label>
                <input type="password" id="regPassword" class="form-control p-3" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-muted">Konfirmasi Password</label>
                <input type="password" id="confirmPassword" class="form-control p-3" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 p-3 fw-bold rounded-pill">Daftar Sekarang</button>
        </form>
        <p class="mt-3 text-center text-muted">Sudah punya akun? <a href="login.html" class="text-primary fw-bold">Masuk</a></p>
    </div>

    <script src="assets/js/auth.js"></script>
</body>
</html>
